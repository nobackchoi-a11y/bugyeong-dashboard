<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="./assets/style.css"><title>데이터 확인</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
</head><body>
<header class="header"><div class="brand"><div class="logo">B</div><div><h1>업로드 데이터 확인</h1><div class="sub">Supabase 최신 데이터 조회</div></div></div></header>
<main class="wrap">
<section class="card">
<label>데이터 종류</label>
<select id="datasetKey">
<option value="fc_activity">가동관리(FC 이미지전송)</option>
<option value="branch_manager">가동관리(지점/매니저 실적)</option>
<option value="agency">대리점관리</option>
</select>
<button class="btn" onclick="loadLatest()">최신 데이터 조회</button>
</section>
<section class="card"><h2>상태</h2><pre id="status">대기 중</pre></section>
<section class="card"><h2>최근 50행</h2><div style="overflow:auto"><table class="table" id="dataTable"></table></div></section>
<p><a class="btn secondary" href="./index.html">🏠 홈으로</a></p>
</main>
<script>
const cfg=window.BUGYEONG_SUPABASE || {};
const statusEl=document.getElementById('status');
const supabaseClient = (!cfg.url || cfg.url.includes("YOUR_")) ? null : window.supabase.createClient(cfg.url, cfg.anonKey);
async function loadLatest(){
 try{
  if(!supabaseClient) throw new Error("supabase-config.js에 URL/Key를 먼저 입력하세요.");
  const key=document.getElementById('datasetKey').value;
  const {data,error}=await supabaseClient.from('dashboard_datasets')
    .select('*').eq('dataset_key',key).order('uploaded_at',{ascending:false}).limit(1);
  if(error) throw error;
  if(!data || !data.length){statusEl.textContent="업로드 데이터 없음"; return;}
  const d=data[0];
  statusEl.textContent=`최신 업로드: ${d.file_name}\n업로드 시간: ${d.uploaded_at}\n행 수: ${d.row_count}`;
  render((d.data||[]).slice(0,50));
 }catch(err){statusEl.textContent="오류: "+(err.message||JSON.stringify(err));}
}
function render(rows){
 const table=document.getElementById('dataTable');
 if(!rows.length){table.innerHTML=""; return;}
 const headers=Object.keys(rows[0]);
 table.innerHTML="<thead><tr>"+headers.map(h=>`<th>${h}</th>`).join("")+"</tr></thead><tbody>"+
 rows.map(r=>"<tr>"+headers.map(h=>`<td>${r[h]??""}</td>`).join("")+"</tr>").join("")+"</tbody>";
}
</script>
</body></html>
