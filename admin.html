<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="./assets/style.css"><title>관리자 업로드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="./supabase-config.js"></script>
</head><body>
<header class="header"><div class="brand"><div class="logo">B</div><div><h1>관리자 업로드</h1><div class="sub">엑셀 → JSON 변환 → Supabase 저장</div></div></div></header>
<main class="wrap">
  <div class="notice">처음에는 setup.html 안내에 따라 Supabase URL/Key와 SQL 테이블을 먼저 설정하세요.</div>
  <section class="card">
    <label>데이터 종류</label>
    <select id="datasetKey">
      <option value="fc_activity">가동관리(FC 이미지전송)</option>
      <option value="branch_manager">가동관리(지점/매니저 실적)</option>
      <option value="agency">대리점관리</option>
    </select>
    <label>엑셀 파일 선택</label>
    <input id="fileInput" type="file" accept=".xlsx,.xls,.csv">
    <label>시트명</label>
    <select id="sheetSelect"><option value="">파일 선택 후 시트 선택</option></select>
    <button class="btn" onclick="uploadExcel()">Supabase에 업로드</button>
    <button class="btn secondary" onclick="previewExcel()">미리보기</button>
  </section>
  <section class="card"><h2>상태</h2><pre id="status">대기 중</pre></section>
  <section class="card"><h2>미리보기</h2><div style="overflow:auto"><table class="table" id="previewTable"></table></div></section>
  <p><a class="btn secondary" href="./index.html">🏠 홈으로</a></p>
</main>
<script>
let workbook=null;
let parsedRows=[];
const statusEl=document.getElementById('status');
const supabaseClient = (() => {
  const cfg=window.BUGYEONG_SUPABASE || {};
  if(!cfg.url || cfg.url.includes("YOUR_")) return null;
  return window.supabase.createClient(cfg.url, cfg.anonKey);
})();

document.getElementById('fileInput').addEventListener('change', async (e)=>{
  const file=e.target.files[0]; if(!file) return;
  statusEl.textContent="파일 읽는 중: "+file.name;
  const buf=await file.arrayBuffer();
  workbook=XLSX.read(buf,{type:'array'});
  const sel=document.getElementById('sheetSelect');
  sel.innerHTML=workbook.SheetNames.map(n=>`<option value="${n}">${n}</option>`).join('');
  statusEl.textContent="시트 선택 후 미리보기 또는 업로드를 누르세요.";
});

function getRows(){
  if(!workbook) throw new Error("엑셀 파일을 먼저 선택하세요.");
  const sheetName=document.getElementById('sheetSelect').value || workbook.SheetNames[0];
  const ws=workbook.Sheets[sheetName];
  return XLSX.utils.sheet_to_json(ws,{defval:""});
}
function previewExcel(){
  try{
    parsedRows=getRows();
    renderPreview(parsedRows.slice(0,30));
    statusEl.textContent=`미리보기 완료: ${parsedRows.length.toLocaleString()}행`;
  }catch(err){ statusEl.textContent="오류: "+err.message; }
}
function renderPreview(rows){
  const table=document.getElementById('previewTable');
  if(!rows.length){table.innerHTML=""; return;}
  const headers=Object.keys(rows[0]);
  table.innerHTML="<thead><tr>"+headers.map(h=>`<th>${h}</th>`).join("")+"</tr></thead><tbody>"+
    rows.map(r=>"<tr>"+headers.map(h=>`<td>${r[h]??""}</td>`).join("")+"</tr>").join("")+"</tbody>";
}
async function uploadExcel(){
  try{
    if(!supabaseClient) throw new Error("supabase-config.js에 URL/Key를 먼저 입력하세요.");
    const file=document.getElementById('fileInput').files[0];
    const datasetKey=document.getElementById('datasetKey').value;
    parsedRows=getRows();
    statusEl.textContent=`업로드 중... ${parsedRows.length.toLocaleString()}행`;
    const {error}=await supabaseClient.from('dashboard_datasets').insert({
      dataset_key: datasetKey,
      file_name: file ? file.name : "",
      uploaded_by: "admin",
      row_count: parsedRows.length,
      data: parsedRows
    });
    if(error) throw error;
    statusEl.textContent=`업로드 완료: ${datasetKey} / ${parsedRows.length.toLocaleString()}행`;
  }catch(err){ statusEl.textContent="오류: "+(err.message||JSON.stringify(err)); }
}
</script>
</body></html>
