<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>활동 통계</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Malgun Gothic',Arial,sans-serif;background:#f3f7fc;color:#0f172a}.wrap{max-width:1560px;margin:0 auto;padding:24px 16px 70px}.hero{background:linear-gradient(135deg,#0b2d5c,#1f4f8f 58%,#16a085);color:#fff;border-radius:0 0 32px 32px;padding:32px 28px;margin-bottom:18px}.hero h1{margin:0;font-size:32px}.hero p{margin:10px 0 0;font-weight:800;opacity:.9}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}.back{text-decoration:none;background:#2563eb;color:white;padding:11px 16px;border-radius:12px;font-weight:900}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}input,button{border:1px solid #cfd9e7;border-radius:12px;padding:11px 14px;background:white;font-weight:900}button{cursor:pointer;background:#1f4f8f;color:white}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}.kpi{background:white;border:1px solid #dbe6f3;border-radius:20px;padding:18px;box-shadow:0 10px 24px rgba(15,47,95,.08);cursor:pointer}.kpi b{display:block;color:#64748b;font-size:13px;margin-bottom:8px}.kpi strong{font-size:28px;color:#173b75}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}.card,.detail{background:white;border:1px solid #dbe6f3;border-radius:20px;padding:18px;box-shadow:0 10px 24px rgba(15,47,95,.06)}h2{margin:0 0 12px}.tablewrap{max-height:430px;overflow:auto;border:1px solid #e2e8f0;border-radius:12px}table{width:100%;border-collapse:collapse;font-size:13px}th{position:sticky;top:0;background:#eff6ff;padding:10px;border-bottom:1px solid #dbe6f3;text-align:left;white-space:nowrap}td{padding:10px;border-bottom:1px solid #edf2f7;white-space:nowrap}tr:hover td{background:#f8fbff}.linkrow{cursor:pointer;font-weight:900;color:#1d4ed8}.empty{padding:30px;text-align:center;color:#64748b;font-weight:900}@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}@media(max-width:700px){.cards{grid-template-columns:1fr}.controls input,.controls button{width:100%}}
</style></head>
<body><div class="wrap">
<header class="hero"><h1>활동 통계</h1><p>로그인 · 화면조회 · FC/대리점/매니저 조회 · 이미지/PDF · 카톡공유 · 활동메뉴 활용</p></header>
<div class="top"><a class="back" href="/index.html">← 홈으로</a><div class="controls"><label>시작일 <input type="date" id="start"></label><label>종료일 <input type="date" id="end"></label><button onclick="loadStats()">조회</button></div></div>
<section class="cards" id="cards"></section>
<section class="grid">
<div class="card"><h2>사용자별 활용도</h2><div class="tablewrap"><table><thead><tr><th>사용자</th><th>횟수</th></tr></thead><tbody id="byUser"></tbody></table></div></div>
<div class="card"><h2>지점별 활용도</h2><div class="tablewrap"><table><thead><tr><th>지점</th><th>횟수</th></tr></thead><tbody id="byBranch"></tbody></table></div></div>
<div class="card"><h2>권한별 활용도</h2><div class="tablewrap"><table><thead><tr><th>권한</th><th>횟수</th></tr></thead><tbody id="byRole"></tbody></table></div></div>
<div class="card"><h2>화면별 사용량</h2><div class="tablewrap"><table><thead><tr><th>화면</th><th>횟수</th></tr></thead><tbody id="byPage"></tbody></table></div></div>
<div class="card"><h2>활동 메뉴별 활용</h2><div class="tablewrap"><table><thead><tr><th>활동메뉴</th><th>횟수</th></tr></thead><tbody id="byActivityMenu"></tbody></table></div></div>
<div class="card"><h2>대상 FC/대리점/매니저 TOP</h2><div class="tablewrap"><table><thead><tr><th>대상</th><th>횟수</th></tr></thead><tbody id="byTarget"></tbody></table></div></div>
</section>
<section class="detail"><h2 id="detailTitle">상세 로그</h2><div class="tablewrap"><table><thead><tr><th>시간</th><th>사용자</th><th>지점</th><th>권한</th><th>행동</th><th>화면</th><th>활동메뉴</th><th>대상구분</th><th>대상</th><th>상세</th></tr></thead><tbody id="detailBody"></tbody></table></div></section>
</div>
<script src="/assets/app-tracker.js"></script>
<script>
function todayStr(){return new Date().toISOString().slice(0,10)}function monthStart(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01"}start.value=monthStart();end.value=todayStr();
function fmt(v){return Math.round(Number(v||0)).toLocaleString()}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}function dt(s){try{return new Date(s).toLocaleString("ko-KR")}catch{return s||""}}
async function fetchStats(extra=""){const res=await fetch("/.netlify/functions/stats-data?start="+encodeURIComponent(start.value)+"&end="+encodeURIComponent(end.value)+extra+"&t="+Date.now(),{cache:"no-store"});const data=await res.json();if(!res.ok)throw new Error(data.error||"통계 조회 실패");return data}
async function loadStats(){try{render(await fetchStats())}catch(e){alert(e.message)}}
function render(data){cards.innerHTML=data.cards.map(c=>`<div class="kpi" onclick="loadDetail('${esc(c.detailMode)}','${esc(c.detailValue)}','${esc(c.label)}')"><b>${esc(c.label)}</b><strong>${fmt(c.value)}</strong></div>`).join("");renderSimple("byUser",data.byUser,"user");renderSimple("byBranch",data.byBranch,"branch");renderSimple("byRole",data.byRole,"role");renderSimple("byPage",data.byPage,"page");renderSimple("byActivityMenu",data.byActivityMenu,"activity_menu");renderSimple("byTarget",data.byTarget,"target");renderDetail(data.recent,"최근 상세 로그")}
function renderSimple(id,rows,mode){document.getElementById(id).innerHTML=(rows&&rows.length?rows.map(r=>`<tr class="linkrow" onclick="loadDetail('${mode}','${esc(r.name)}','${esc(r.name)}')"><td>${esc(r.name)}</td><td>${fmt(r.count)}</td></tr>`).join(""):`<tr><td colspan="2" class="empty">데이터 없음</td></tr>`)}
async function loadDetail(mode,value,title){try{const data=await fetchStats("&mode="+encodeURIComponent(mode)+"&value="+encodeURIComponent(value));renderDetail(data.detail,title+" 상세")}catch(e){alert(e.message)}}
function renderDetail(rows,title){detailTitle.textContent=title;detailBody.innerHTML=(rows&&rows.length?rows.map(r=>`<tr><td>${esc(dt(r.created_at))}</td><td>${esc((r.user_name||"")+" "+(r.emp_no||""))}</td><td>${esc(r.branch||"")}</td><td>${esc(r.role||"")}</td><td>${esc(r.event_type||"")}</td><td>${esc(r.page||"")}</td><td>${esc(r.activity_menu||"")}</td><td>${esc(r.target_type||"")}</td><td>${esc((r.target_name||"")+" "+(r.target_code||""))}</td><td>${esc(r.action_detail||"")}</td></tr>`).join(""):`<tr><td colspan="10" class="empty">상세 데이터 없음</td></tr>`)}
loadStats();
</script></body></html>
